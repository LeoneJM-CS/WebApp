<!DOCTYPE html> <!-- Document type declaration -->
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Class 3 example</title> <!-- Title of the Web Page -->
    </head>
    <body>
        
        <form>
            <label for="datePicker">Dates Available: </label>
            <input type="date" id="datePicker" title="Select a date"><br>
            <label for="colorPicker">Colors Available: </label>
            <input type="color" id="colorPicker" title="Select a color"><br>
            <label for="numberInput">Numbers Available: </label>
            <input type="number" id="numberInput" min="0" max="100" title="Select a number" required><br>
            <input type="range" id="rangeInput" min="0" max="10" value="2" title="Select a range"><br>
            <input type="submit">
        </form>
    </body>
</html>
